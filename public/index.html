
<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Science - Advanced Network & Proxy Browser</title><style>*{margin:0;padding:0;box-sizing:border-box;}body,html{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#fff;background:#000;overflow:hidden;}.background{position:fixed;inset:0;background:url('https://thumbs.dreamstime.com/b/global-network-connection-map-glowing-nodes-futuristic-world-interconnected-purple-blue-digital-lines-dots-dark-cosmic-438232061.jpg') center/cover no-repeat;filter:brightness(0.45) contrast(1.3) saturate(1.1);z-index:1;}.overlay{position:fixed;inset:0;background:radial-gradient(circle at 20% 80%, rgba(0,80,180,0.18), transparent 50%);z-index:2;}.content{position:relative;z-index:10;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:15px;}h1{font-size:clamp(3.5rem,12vw,8rem);font-weight:900;letter-spacing:-0.04em;background:linear-gradient(90deg,#00b4ff,#7c00ff,#ff00aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.3em;text-shadow:0 0 30px rgba(0,180,255,0.5);}.subtitle{font-size:clamp(1.2rem,4vw,2rem);font-weight:300;opacity:0.9;margin-bottom:2.5rem;letter-spacing:0.04em;}.search-container{position:relative;width:100%;max-width:680px;}input[type="text"]{width:100%;padding:16px 70px 16px 22px;font-size:1.1rem;border:none;border-radius:60px;background:rgba(40,40,60,0.78);backdrop-filter:blur(12px);color:white;outline:none;box-shadow:0 6px 24px rgba(0,0,0,0.5);transition:all 0.3s;}input::placeholder{color:rgba(255,255,255,0.55);}input:focus{background:rgba(60,60,90,0.92);box-shadow:0 0 0 4px rgba(0,180,255,0.45);}.search-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:48px;height:48px;background:linear-gradient(135deg,#0066ff,#00aaff);border:none;border-radius:50%;color:white;font-size:1.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 18px rgba(0,100,255,0.5);}.arrows{position:absolute;bottom:4%;left:50%;transform:translateX(-50%);font-size:2.5rem;opacity:0.4;display:flex;gap:3.5rem;}</style></head><body><div class="background"></div><div class="overlay"></div><div class="content"><h1>Science</h1><div class="subtitle">Advanced Network & Proxy Browser</div><form class="search-container" onsubmit="handleSubmit(event)"><input type="text" id="input" placeholder="URL または 検索ワードを入力" autocomplete="off"/><button type="submit" class="search-btn">🔍</button></form><div class="arrows"><div>&lt;</div><div>&gt;</div></div></div>><script>
function handleSubmit(e){
  e.preventDefault();

  let input=document.getElementById('input').value.trim();
  if(!input) return;

  let targetUrl=input;

  if(!/^https?:\/\//i.test(input)){
    if(input.includes('.') && !input.includes(' ')){
      targetUrl='https://'+input;
    }else{
      targetUrl='https://search.yahoo.com/search?p='+encodeURIComponent(input);
    }
  }

  location.href = "/proxy/" + encodeURIComponent(targetUrl);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(() => {
    console.log("SW ready")
  })
}
</script>
</body></html>
