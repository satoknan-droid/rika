<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Science - Advanced Network & Proxy Browser</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body,html{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#fff;background:#000;overflow:hidden;}

.background{
  position:fixed;
  inset:0;
  background:url('https://thumbs.dreamstime.com/b/global-network-connection-map-glowing-nodes-futuristic-world-interconnected-purple-blue-digital-lines-dots-dark-cosmic-438232061.jpg') center/cover no-repeat;
  filter:brightness(0.45) contrast(1.3) saturate(1.1);
  z-index:1;
}

.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 20% 80%, rgba(0,80,180,0.18), transparent 50%);
  z-index:2;
}

.content{
  position:relative;
  z-index:10;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:15px;
}

h1{
  font-size:clamp(3.5rem,12vw,8rem);
  font-weight:900;
  letter-spacing:-0.04em;
  background:linear-gradient(90deg,#00b4ff,#7c00ff,#ff00aa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:0.3em;
  text-shadow:0 0 30px rgba(0,180,255,0.5);
}

.subtitle{
  font-size:clamp(1.2rem,4vw,2rem);
  font-weight:300;
  opacity:0.9;
  margin-bottom:2.5rem;
  letter-spacing:0.04em;
}

.search-container{
  position:relative;
  width:100%;
  max-width:680px;
}

input{
  width:100%;
  padding:16px 70px 16px 22px;
  font-size:1.1rem;
  border:none;
  border-radius:60px;
  background:rgba(40,40,60,0.78);
  backdrop-filter:blur(12px);
  color:white;
  outline:none;
  box-shadow:0 6px 24px rgba(0,0,0,0.5);
}

.search-btn{
  position:absolute;
  right:6px;
  top:50%;
  transform:translateY(-50%);
  width:48px;
  height:48px;
  background:linear-gradient(135deg,#0066ff,#00aaff);
  border:none;
  border-radius:50%;
  color:white;
  font-size:1.6rem;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="content">
  <h1>Science</h1>
  <div class="subtitle">Advanced Network & Proxy Browser</div>

  <form class="search-container" onsubmit="handleSubmit(event)">
    <input type="text" id="input" placeholder="Enter URL or keyword" autocomplete="off"/>
    <button type="submit" class="search-btn">🔍</button>
  </form>

</div>

<script>
function handleSubmit(e){
  e.preventDefault();

  let input = document.getElementById('input').value.trim();
  if(!input) return;

  let targetUrl = input;

  // If not URL
  if(!/^https?:\/\//i.test(input)){
    if(input.includes('.') && !input.includes(' ')){
      targetUrl = 'https://' + input;
    }else{
      targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(input);
    }
  }

  location.href = targetUrl;
}
</script>

</body>
</html>
